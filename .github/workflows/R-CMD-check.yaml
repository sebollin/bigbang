on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R-${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel'}
          - {os: ubuntu-latest, r: 'oldrel-1'}
          - {os: windows-latest, r: 'release'}
          - {os: macos-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Generate Spanish locale for gettext tests
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y language-pack-es
          sudo locale-gen es_ES.UTF-8

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::covr, any::lintr, any::tinytex
          needs: check

      - name: Install LaTeX packages required by the PDF manual
        run: Rscript -e "tinytex::tlmgr_install(c('makeindex', 'texinfo'))"
        shell: bash

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--as-cran")'
          build_args: 'c("--compact-vignettes=gs+qpdf")'
          error-on: '"warning"'

      - name: Report test coverage
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release'
        shell: Rscript {0}
        run: |
          coverage <- covr::package_coverage(quiet = FALSE)
          print(coverage)

      - name: Report lint findings
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release'
        shell: Rscript {0}
        run: |
          findings <- lintr::lint_package()
          print(findings)
